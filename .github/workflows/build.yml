name: Build installers

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: ScubedTimesheet.exe
            playwright_browser: msedge
          - os: macos-latest
            artifact: ScubedTimesheet
            playwright_browser: chrome
          - os: ubuntu-latest
            artifact: ScubedTimesheet
            playwright_browser: chromium

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Install Playwright browser
        run: python -m playwright install ${{ matrix.playwright_browser }}

      - name: Build
        run: pyinstaller scubed_timesheet.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ScubedTimesheet-${{ matrix.os }}
          path: dist/${{ matrix.artifact }}

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.artifact }}

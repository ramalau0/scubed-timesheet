name: Build installers

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: ScubedTimesheet.exe
            release_name: ScubedTimesheet-windows.exe
            install_browser: false
          - os: macos-latest
            artifact_name: ScubedTimesheet
            release_name: ScubedTimesheet-macos
            install_browser: true
            playwright_browser: chromium
          - os: ubuntu-latest
            artifact_name: ScubedTimesheet
            release_name: ScubedTimesheet-linux
            install_browser: true
            playwright_browser: chromium

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Install Playwright browser
        if: matrix.install_browser
        run: python -m playwright install ${{ matrix.playwright_browser }}

      - name: Build
        run: pyinstaller scubed_timesheet.spec

      - name: Rename binary for release
        shell: bash
        run: mv dist/${{ matrix.artifact_name }} dist/${{ matrix.release_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.release_name }}
          path: dist/${{ matrix.release_name }}

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.release_name }}
